<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الإدارة</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Kufi Arabic', sans-serif;
    background: #f9fafb;
    min-height: 100vh;
    direction: rtl;
    color: #111827;
  }

  /* ── Login ── */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  .login-card {
    background: white; border-radius: 16px; padding: 36px 32px;
    width: 100%; max-width: 360px;
    border: 0.5px solid #e5e7eb;
  }
  .login-card h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .login-card p  { font-size: 13px; color: #9ca3af; margin-bottom: 24px; }
  .login-card input {
    width: 100%; padding: 10px 14px; border: 1.5px solid #e5e7eb;
    border-radius: 10px; font-size: 14px; font-family: inherit;
    outline: none; margin-bottom: 14px; direction: rtl;
  }
  .login-card input:focus { border-color: #6366f1; }
  .login-card button {
    width: 100%; padding: 11px; background: #6366f1; color: white;
    border: none; border-radius: 10px; font-size: 15px; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  .login-card button:hover { opacity: 0.9; }
  #login-error { font-size: 13px; color: #ef4444; text-align: center; margin-top: 10px; min-height: 18px; }

  /* ── Dashboard ── */
  #dashboard { display: none; }
  .topbar {
    background: white; border-bottom: 0.5px solid #e5e7eb;
    padding: 14px 28px; display: flex; align-items: center; justify-content: space-between;
  }
  .topbar h1 { font-size: 17px; font-weight: 700; }
  .topbar span { font-size: 13px; color: #9ca3af; }
  .stats {
    display: flex; gap: 16px; padding: 24px 28px 0; flex-wrap: wrap;
  }
  .stat {
    background: white; border-radius: 12px; border: 0.5px solid #e5e7eb;
    padding: 16px 20px; flex: 1; min-width: 130px;
  }
  .stat .label { font-size: 12px; color: #9ca3af; margin-bottom: 6px; }
  .stat .value { font-size: 24px; font-weight: 700; }
  .stat.pending .value { color: #d97706; }
  .stat.approved .value { color: #16a34a; }
  .stat.rejected .value { color: #dc2626; }

  .section { padding: 24px 28px; }
  .section h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }

  .report-card {
    background: white; border-radius: 12px; border: 0.5px solid #e5e7eb;
    padding: 18px 20px; margin-bottom: 12px;
  }
  .report-meta {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 12px; flex-wrap: wrap; gap: 8px;
  }
  .report-lesson { font-size: 15px; font-weight: 600; }
  .report-date { font-size: 12px; color: #9ca3af; }
  .report-field {
    display: inline-block; font-size: 12px; font-weight: 600;
    padding: 3px 10px; border-radius: 20px;
    background: #ede9fe; color: #5b21b6; margin-bottom: 12px;
  }
  .report-values {
    display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap;
  }
  .val-box {
    flex: 1; min-width: 120px; padding: 10px 14px;
    border-radius: 8px; font-size: 13px;
  }
  .val-box .val-label { font-size: 11px; color: #9ca3af; margin-bottom: 4px; }
  .val-box .val-text { font-weight: 600; }
  .val-wrong  { background: #fef2f2; }
  .val-wrong .val-text  { color: #dc2626; }
  .val-right  { background: #f0fdf4; }
  .val-right .val-text  { color: #16a34a; }
  .report-user { font-size: 12px; color: #6b7280; margin-bottom: 14px; }
  .report-actions { display: flex; gap: 10px; }
  .btn-approve, .btn-reject {
    flex: 1; padding: 8px; border: none; border-radius: 8px;
    font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
    transition: opacity 0.15s;
  }
  .btn-approve { background: #dcfce7; color: #15803d; }
  .btn-approve:hover { background: #bbf7d0; }
  .btn-reject  { background: #fee2e2; color: #b91c1c; }
  .btn-reject:hover  { background: #fecaca; }
  .btn-approve:disabled, .btn-reject:disabled { opacity: 0.4; cursor: not-allowed; }

  .empty { text-align: center; padding: 48px; color: #9ca3af; font-size: 14px; }
  .loading { text-align: center; padding: 48px; color: #9ca3af; font-size: 14px; }

  .badge-done {
    font-size: 13px; font-weight: 600; padding: 6px 14px;
    border-radius: 8px; display: inline-block;
  }
  .badge-approved { background: #dcfce7; color: #15803d; }
  .badge-rejected { background: #fee2e2; color: #b91c1c; }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <h1>لوحة الإدارة</h1>
    <p>LMS Smart Lesson Planner</p>
    <input type="password" id="password" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter') login()">
    <button onclick="login()">دخول</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <div class="topbar">
    <h1>🚩 لوحة مراجعة التعديلات</h1>
    <span id="last-updated"></span>
  </div>

  <div class="stats">
    <div class="stat pending">
      <div class="label">بانتظار المراجعة</div>
      <div class="value" id="count-pending">—</div>
    </div>
    <div class="stat approved">
      <div class="label">تمت الموافقة</div>
      <div class="value" id="count-approved">—</div>
    </div>
    <div class="stat rejected">
      <div class="label">مرفوض</div>
      <div class="value" id="count-rejected">—</div>
    </div>
  </div>

  <div class="section">
    <h2>الطلبات المعلّقة</h2>
    <div id="reports-list"><div class="loading">جارٍ التحميل...</div></div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://rznegxkfwwtqkytkoljs.supabase.co";
const SERVICE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ6bmVneGtmd3d0cWt5dGtvbGpzIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MjI1Mjc4OCwiZXhwIjoyMDg3ODI4Nzg4fQ.lzv7U-VtXw9kBIcR1WHgfyCT3CqPw1x7oHYyiRe-EHs";
const ADMIN_PASSWORD = "Ghostfiles@0812";

const FIELD_LABELS = {
  student_book_pages: "صفحات كتاب الطالب",
  activity_book_pages: "صفحات كتاب النشاط",
  exercise_number: "رقم التمرين",
  unit_number: "رقم الوحدة",
  lesson_number: "رقم الدرس",
  semester: "الفصل الدراسي"
};

function login() {
  const pw = document.getElementById("password").value;
  if (pw === ADMIN_PASSWORD) {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    loadReports();
  } else {
    document.getElementById("login-error").textContent = "كلمة المرور غير صحيحة";
  }
}

async function supabase(method, path, body) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method,
    headers: {
      "apikey": SERVICE_KEY,
      "Authorization": `Bearer ${SERVICE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": method === "PATCH" ? "return=minimal" : "return=representation"
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (method === "PATCH") return res.ok;
  return res.json();
}

async function loadReports() {
  document.getElementById("reports-list").innerHTML = '<div class="loading">جارٍ التحميل...</div>';

  const all = await supabase("GET", "lesson_reports?select=*&order=created_at.desc");

  const pending  = all.filter(r => r.status === "pending");
  const approved = all.filter(r => r.status === "approved");
  const rejected = all.filter(r => r.status === "rejected");

  document.getElementById("count-pending").textContent  = pending.length;
  document.getElementById("count-approved").textContent = approved.length;
  document.getElementById("count-rejected").textContent = rejected.length;
  document.getElementById("last-updated").textContent   = "آخر تحديث: " + new Date().toLocaleTimeString("ar-OM");

  const list = document.getElementById("reports-list");

  if (pending.length === 0) {
    list.innerHTML = '<div class="empty">لا توجد طلبات معلّقة 🎉</div>';
    return;
  }

  list.innerHTML = pending.map(r => `
    <div class="report-card" id="card-${r.id}">
      <div class="report-meta">
        <div class="report-lesson">${r.lesson_id}</div>
        <div class="report-date">${new Date(r.created_at).toLocaleDateString("ar-OM")}</div>
      </div>
      <div class="report-field">${FIELD_LABELS[r.field] || r.field}</div>
      <div class="report-values">
        <div class="val-box val-wrong">
          <div class="val-label">القيمة الخاطئة</div>
          <div class="val-text">${r.old_value || '—'}</div>
        </div>
        <div class="val-box val-right">
          <div class="val-label">القيمة الصحيحة</div>
          <div class="val-text">${r.new_value}</div>
        </div>
      </div>
      <div class="report-user">المعلم: ${r.user_id}</div>
      <div class="report-actions">
        <button class="btn-approve" onclick="updateStatus('${r.id}', 'approved', this)">✓ موافقة</button>
        <button class="btn-reject"  onclick="updateStatus('${r.id}', 'rejected', this)">✕ رفض</button>
      </div>
    </div>
  `).join("");
}

async function updateStatus(id, status, btn) {
  const card = document.getElementById(`card-${id}`);
  const buttons = card.querySelectorAll("button");
  buttons.forEach(b => b.disabled = true);
  btn.textContent = "جارٍ...";

  const ok = await supabase("PATCH", `lesson_reports?id=eq.${id}`, {
    status,
    reviewed_at: new Date().toISOString()
  });

  if (ok) {
    const actions = card.querySelector(".report-actions");
    const label = status === "approved" ? "تمت الموافقة ✓" : "مرفوض ✕";
    const cls   = status === "approved" ? "badge-approved" : "badge-rejected";
    actions.innerHTML = `<span class="badge-done ${cls}">${label}</span>`;

    const countEl = document.getElementById(`count-${status}`);
    countEl.textContent = parseInt(countEl.textContent) + 1;
    const pendingEl = document.getElementById("count-pending");
    pendingEl.textContent = parseInt(pendingEl.textContent) - 1;

    setTimeout(() => {
      card.style.transition = "opacity 0.4s";
      card.style.opacity = "0";
      setTimeout(() => card.remove(), 400);
    }, 1000);
  } else {
    buttons.forEach(b => b.disabled = false);
    btn.textContent = status === "approved" ? "✓ موافقة" : "✕ رفض";
  }
}
</script>
</body>
</html>
